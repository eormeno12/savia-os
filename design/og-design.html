<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=block" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; background: #0B2529; }
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

    .canvas {
      position: relative;
      width: 1200px; height: 630px;
      background: #0B2529;
      overflow: hidden;
    }

    /* Dot grid texture */
    .canvas::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(244,244,241,0.055) 1px, transparent 1px);
      background-size: 36px 36px;
      z-index: 0; pointer-events: none;
    }

    /* Atmospheric lime glow — outer */
    .glow-xl {
      position: absolute; pointer-events: none; border-radius: 50%; z-index: 1;
      width: 860px; height: 860px;
      top: calc(400px - 430px); left: calc(600px - 430px);
      background: radial-gradient(circle,
        rgba(231,255,24,0.11) 0%,
        rgba(231,255,24,0.04) 38%,
        transparent 65%
      );
      filter: blur(28px);
    }

    /* Core glow */
    .glow-core {
      position: absolute; pointer-events: none; border-radius: 50%; z-index: 1;
      width: 300px; height: 300px;
      top: calc(400px - 150px); left: calc(600px - 150px);
      background: radial-gradient(circle,
        rgba(231,255,24,0.20) 0%,
        rgba(231,255,24,0.07) 45%,
        transparent 70%
      );
    }

    /* Full-canvas SVG layers */
    .svg-bg  { position: absolute; top: 0; left: 0; width: 1200px; height: 630px; z-index: 2; pointer-events: none; }
    .svg-top { position: absolute; top: 0; left: 0; width: 1200px; height: 630px; z-index: 4; pointer-events: none; }

    /* Wordmark */
    .wordmark {
      position: absolute; top: 42px; left: 62px;
      display: flex; align-items: center; gap: 11px; z-index: 10;
    }
    .wordmark-name {
      color: #F4F4F1; font-size: 20px; font-weight: 700; letter-spacing: 0.14em;
    }

    /* Headline */
    .headline-wrap {
      position: absolute; top: 84px; left: 0; right: 0; z-index: 10;
      text-align: center; line-height: 1.08; letter-spacing: -0.026em;
    }
    .hl-line { display: block; font-size: 50px; }
    .hl-light { color: rgba(244,244,241,0.72); font-weight: 300; }
    .hl-bold  { color: #E7FF18; font-weight: 700; }

    /* Center emblem — real Savia mark */
    .emblem {
      position: absolute;
      top: calc(400px - 56px); left: calc(600px - 56px);
      width: 112px; height: 112px; z-index: 10;
      filter:
        drop-shadow(0 0 24px rgba(231,255,24,0.55))
        drop-shadow(0 0 60px rgba(231,255,24,0.28));
    }

    /* AI chips */
    .chip {
      position: absolute; transform: translate(-50%, -50%);
      display: flex; align-items: center; gap: 10px;
      padding: 0 15px 0 9px; height: 50px;
      border-radius: 999px;
      background: rgba(11,37,41,0.55);
      border: 1px solid rgba(244,244,241,0.14);
      z-index: 10; white-space: nowrap;
    }
    .chip-badge {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chip-label {
      color: rgba(244,244,241,0.9); font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
    }

    /* Domain */
    .domain {
      position: absolute; bottom: 42px; left: 62px;
      color: rgba(244,244,241,0.28); font-size: 15px;
      font-weight: 400; letter-spacing: 0.08em; z-index: 10;
    }

    /* Incubated-by badge */
    .incubated {
      position: absolute; bottom: 42px; right: 62px;
      display: flex; align-items: center; gap: 12px; z-index: 10;
    }
    .incubated-label {
      color: rgba(244,244,241,0.38); font-size: 13px;
      font-weight: 400; letter-spacing: 0.04em; white-space: nowrap;
    }
    .incubated img {
      height: 44px; width: auto; opacity: 0.65;
      filter: brightness(0) invert(1);
    }
  </style>
</head>
<body>
<div class="canvas">

  <!-- Glow layers -->
  <div class="glow-xl"></div>
  <div class="glow-core"></div>

  <!--
    Geometry:
    Center: (600, 400)  Orbit: RX=200, RY=135

    Chip centers (angle from top, clockwise):
      ChatGPT  270°  (600, 265)
      Gemini   330°  (773, 332)
      Cursor    30°  (773, 468)
      Windsurf  90°  (600, 535)
      Claude   150°  (427, 468)
      Copilot  210°  (427, 332)

    Emblem edge (r=56) toward each chip:
      (600,344)  (647,372)  (647,428)
      (600,456)  (553,428)  (553,372)
  -->

  <!-- Orbital rings (decorative, paper on dark) -->
  <svg class="svg-bg" viewBox="0 0 1200 630" fill="none">
    <circle cx="600" cy="400" r="155" stroke="rgba(244,244,241,0.065)" stroke-width="1"/>
    <circle cx="600" cy="400" r="235" stroke="rgba(244,244,241,0.045)" stroke-width="1"/>
    <circle cx="600" cy="400" r="325" stroke="rgba(244,244,241,0.028)" stroke-width="1"/>
  </svg>

  <!-- Connection lines + endpoint dots -->
  <svg class="svg-top" viewBox="0 0 1200 630" fill="none">
    <defs>
      <linearGradient id="g-chatgpt"  x1="600" y1="265" x2="600" y2="344" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#10A37F" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#E7FF18" stop-opacity="0.30"/>
      </linearGradient>
      <linearGradient id="g-gemini"   x1="773" y1="332" x2="647" y2="372" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#4285F4" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#E7FF18" stop-opacity="0.30"/>
      </linearGradient>
      <linearGradient id="g-cursor"   x1="773" y1="468" x2="647" y2="428" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#7C5CFC" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#E7FF18" stop-opacity="0.30"/>
      </linearGradient>
      <linearGradient id="g-windsurf" x1="600" y1="535" x2="600" y2="456" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#E7FF18" stop-opacity="0.30"/>
      </linearGradient>
      <linearGradient id="g-claude"   x1="427" y1="468" x2="553" y2="428" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#D97757" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#E7FF18" stop-opacity="0.30"/>
      </linearGradient>
      <linearGradient id="g-copilot"  x1="427" y1="332" x2="553" y2="372" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#0969DA" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#E7FF18" stop-opacity="0.30"/>
      </linearGradient>
    </defs>

    <!-- Dashed lines: chip → emblem edge -->
    <line x1="600" y1="265" x2="600" y2="344" stroke="url(#g-chatgpt)"  stroke-width="1.5" stroke-dasharray="4 4"/>
    <line x1="773" y1="332" x2="647" y2="372" stroke="url(#g-gemini)"   stroke-width="1.5" stroke-dasharray="4 4"/>
    <line x1="773" y1="468" x2="647" y2="428" stroke="url(#g-cursor)"   stroke-width="1.5" stroke-dasharray="4 4"/>
    <line x1="600" y1="535" x2="600" y2="456" stroke="url(#g-windsurf)" stroke-width="1.5" stroke-dasharray="4 4"/>
    <line x1="427" y1="468" x2="553" y2="428" stroke="url(#g-claude)"   stroke-width="1.5" stroke-dasharray="4 4"/>
    <line x1="427" y1="332" x2="553" y2="372" stroke="url(#g-copilot)"  stroke-width="1.5" stroke-dasharray="4 4"/>

    <!-- Chip end dots -->
    <circle cx="600" cy="265" r="3.5" fill="#10A37F" opacity="0.9"/>
    <circle cx="773" cy="332" r="3.5" fill="#4285F4" opacity="0.9"/>
    <circle cx="773" cy="468" r="3.5" fill="#7C5CFC" opacity="0.9"/>
    <circle cx="600" cy="535" r="3.5" fill="#0EA5E9" opacity="0.9"/>
    <circle cx="427" cy="468" r="3.5" fill="#D97757" opacity="0.9"/>
    <circle cx="427" cy="332" r="3.5" fill="#0969DA" opacity="0.9"/>

    <!-- Emblem edge dots (lime) -->
    <circle cx="600" cy="344" r="2.5" fill="#E7FF18" opacity="0.6"/>
    <circle cx="647" cy="372" r="2.5" fill="#E7FF18" opacity="0.6"/>
    <circle cx="647" cy="428" r="2.5" fill="#E7FF18" opacity="0.6"/>
    <circle cx="600" cy="456" r="2.5" fill="#E7FF18" opacity="0.6"/>
    <circle cx="553" cy="428" r="2.5" fill="#E7FF18" opacity="0.6"/>
    <circle cx="553" cy="372" r="2.5" fill="#E7FF18" opacity="0.6"/>
  </svg>

  <!-- ── WORDMARK (real Savia mark + SAVIA) ───────────────────────── -->
  <div class="wordmark">
    <svg width="44" height="44" viewBox="0 0 148 148" fill="#E7FF18" aria-hidden="true">
      <path d="M42.2 0H63.8A7.2 7.2 0 0 1 71 7.2V28.8A7.2 7.2 0 0 1 63.8 36H42.2C38.8 36 36 38.8 36 42.2V63.8A7.2 7.2 0 0 1 28.8 71H7.2A7.2 7.2 0 0 1 0 63.8V42.2A7.2 7.2 0 0 1 7.2 35H28.8C32.2 35 35 32.2 35 28.8V7.2A7.2 7.2 0 0 1 42.2 0Z"/>

      <path d="M42.2 0H63.8A7.2 7.2 0 0 1 71 7.2V28.8A7.2 7.2 0 0 1 63.8 36H42.2C38.8 36 36 38.8 36 42.2V63.8A7.2 7.2 0 0 1 28.8 71H7.2A7.2 7.2 0 0 1 0 63.8V42.2A7.2 7.2 0 0 1 7.2 35H28.8C32.2 35 35 32.2 35 28.8V7.2A7.2 7.2 0 0 1 42.2 0Z" transform="rotate(180 74 74)"/>
      <path d="M42.2 0H63.8A7.2 7.2 0 0 1 71 7.2V28.8A7.2 7.2 0 0 1 63.8 36H42.2C38.8 36 36 38.8 36 42.2V63.8A7.2 7.2 0 0 1 28.8 71H7.2A7.2 7.2 0 0 1 0 63.8V42.2A7.2 7.2 0 0 1 7.2 35H28.8C32.2 35 35 32.2 35 28.8V7.2A7.2 7.2 0 0 1 42.2 0Z" transform="rotate(270 74 74)"/>
    </svg>
    <span class="wordmark-name">SAVIA</span>
  </div>

  <!-- ── HEADLINE ───────────────────────────────────────────────────── -->
  <div class="headline-wrap">
    <span class="hl-line hl-light">La memoria que</span>
    <span class="hl-line"><span class="hl-bold">conecta</span><span class="hl-light"> todas tus IAs.</span></span>
  </div>

  <!-- ── CENTER EMBLEM (real 4-piece Savia mark, 112×112) ──────────── -->
  <div class="emblem">
    <svg width="112" height="112" viewBox="0 0 148 148" fill="#E7FF18" aria-hidden="true">
      <path d="M42.2 0H63.8A7.2 7.2 0 0 1 71 7.2V28.8A7.2 7.2 0 0 1 63.8 36H42.2C38.8 36 36 38.8 36 42.2V63.8A7.2 7.2 0 0 1 28.8 71H7.2A7.2 7.2 0 0 1 0 63.8V42.2A7.2 7.2 0 0 1 7.2 35H28.8C32.2 35 35 32.2 35 28.8V7.2A7.2 7.2 0 0 1 42.2 0Z"/>
      <path d="M42.2 0H63.8A7.2 7.2 0 0 1 71 7.2V28.8A7.2 7.2 0 0 1 63.8 36H42.2C38.8 36 36 38.8 36 42.2V63.8A7.2 7.2 0 0 1 28.8 71H7.2A7.2 7.2 0 0 1 0 63.8V42.2A7.2 7.2 0 0 1 7.2 35H28.8C32.2 35 35 32.2 35 28.8V7.2A7.2 7.2 0 0 1 42.2 0Z" transform="rotate(90 74 74)"/>
      <path d="M42.2 0H63.8A7.2 7.2 0 0 1 71 7.2V28.8A7.2 7.2 0 0 1 63.8 36H42.2C38.8 36 36 38.8 36 42.2V63.8A7.2 7.2 0 0 1 28.8 71H7.2A7.2 7.2 0 0 1 0 63.8V42.2A7.2 7.2 0 0 1 7.2 35H28.8C32.2 35 35 32.2 35 28.8V7.2A7.2 7.2 0 0 1 42.2 0Z" transform="rotate(180 74 74)"/>
      <path d="M42.2 0H63.8A7.2 7.2 0 0 1 71 7.2V28.8A7.2 7.2 0 0 1 63.8 36H42.2C38.8 36 36 38.8 36 42.2V63.8A7.2 7.2 0 0 1 28.8 71H7.2A7.2 7.2 0 0 1 0 63.8V42.2A7.2 7.2 0 0 1 7.2 35H28.8C32.2 35 35 32.2 35 28.8V7.2A7.2 7.2 0 0 1 42.2 0Z" transform="rotate(270 74 74)"/>
    </svg>
  </div>

  <!-- ── AI CHIPS ────────────────────────────────────────────────────── -->

  <!-- ChatGPT — top center (600, 265) -->
  <div class="chip" style="left:600px;top:265px;box-shadow:0 0 20px rgba(16,163,127,0.20),inset 0 1px 0 rgba(244,244,241,0.06);">
    <div class="chip-badge" style="background:#10A37F;">
      <!-- OpenAI official icon (simple-icons) -->
      <svg width="17" height="17" viewBox="0 0 24 24" fill="white">
        <path d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.0729zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.142.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.872zm16.5963 3.8558L13.1038 8.364 15.1192 7.2a.0757.0757 0 0 1 .071 0l4.8303 2.7913a4.4944 4.4944 0 0 1-.6765 8.1042v-5.6772a.79.79 0 0 0-.407-.667zm2.0107-3.0231l-.142-.0852-4.7735-2.7818a.7759.7759 0 0 0-.7854 0L9.409 9.2297V6.8974a.0662.0662 0 0 1 .0284-.0615l4.8303-2.7866a4.4992 4.4992 0 0 1 6.6802 4.66zM8.3065 12.863l-2.02-1.1638a.0804.0804 0 0 1-.038-.0567V6.0742a4.4992 4.4992 0 0 1 7.3757-3.4537l-.142.0805L8.704 5.459a.7948.7948 0 0 0-.3927.6813zm1.0976-2.3654l2.602-1.4998 2.6069 1.4998v2.9994l-2.5974 1.4997-2.6067-1.4997Z"/>
      </svg>
    </div>
    <span class="chip-label">ChatGPT</span>
  </div>

  <!-- Gemini — upper right (773, 332) -->
  <div class="chip" style="left:773px;top:332px;box-shadow:0 0 20px rgba(66,133,244,0.20),inset 0 1px 0 rgba(244,244,241,0.06);">
    <div class="chip-badge" style="background:linear-gradient(135deg,#4285F4 0%,#9E72FF 100%);">
      <!-- Google Gemini official icon (simple-icons) -->
      <svg width="17" height="17" viewBox="0 0 24 24" fill="white">
        <path d="M11.04 19.32Q12 21.51 12 24q0-2.49.93-4.68.96-2.19 2.58-3.81t3.81-2.55Q21.51 12 24 12q-2.49 0-4.68-.93a12.3 12.3 0 0 1-3.81-2.58 12.3 12.3 0 0 1-2.58-3.81Q12 2.49 12 0q0 2.49-.96 4.68-.93 2.19-2.55 3.81a12.3 12.3 0 0 1-3.81 2.58Q2.49 12 0 12q2.49 0 4.68.96 2.19.93 3.81 2.55t2.55 3.81"/>
      </svg>
    </div>
    <span class="chip-label">Gemini</span>
  </div>

  <!-- Cursor — lower right (773, 468) -->
  <div class="chip" style="left:773px;top:468px;box-shadow:0 0 20px rgba(124,92,252,0.20),inset 0 1px 0 rgba(244,244,241,0.06);">
    <div class="chip-badge" style="background:#000;">
      <!-- Cursor official icon (simple-icons) -->

    <div class="chip-badge" style="background:#1A1A2E;">

      </svg>
    </div>
    <span class="chip-label">Windsurf</span>
  </div>

  <!-- Claude — lower left (427, 468) -->
  <div class="chip" style="left:427px;top:468px;box-shadow:0 0 20px rgba(217,119,87,0.20),inset 0 1px 0 rgba(244,244,241,0.06);">
    <div class="chip-badge" style="background:#D97757;">
