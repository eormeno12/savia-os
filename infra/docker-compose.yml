name: savia
services:
  # ---- backing services ----
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: savia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-savia}
      POSTGRES_DB: savia
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savia"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes: ["redisdata:/data"]
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.14.1
    volumes: ["qdrantdata:/qdrant/storage"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- application services (all share same image, CMD overridden) ----
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ["dumb-init", "node", "dist/main.js"]
    env_file: [./.env]
    environment:
      DATABASE_URL: "postgresql://savia:${POSTGRES_PASSWORD:-savia}@postgres:5432/savia"
      REDIS_URL: "redis://redis:6379"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4400/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ["dumb-init", "node", "dist/worker.js"]
    env_file: [./.env]
    environment:
      DATABASE_URL: "postgresql://savia:${POSTGRES_PASSWORD:-savia}@postgres:5432/savia"
      REDIS_URL: "redis://redis:6379"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_healthy }
    restart: unless-stopped

  mcp:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ["dumb-init", "node", "dist/mcp.js"]
    env_file: [./.env]
    environment:
      DATABASE_URL: "postgresql://savia:${POSTGRES_PASSWORD:-savia}@postgres:5432/savia"
      REDIS_URL: "redis://redis:6379"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_healthy }
    restart: unless-stopped

  # ---- gateway: only service exposed to internet ----
  gateway:
    image: caddy:2-alpine
    ports: ["80:80", "443:443", "443:443/udp"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - api
      - mcp
    restart: unless-stopped

volumes:
  pgdata: {}
  redisdata: {}
  qdrantdata: {}
  caddydata: {}
  caddyconfig: {}
